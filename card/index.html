<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://kit.fontawesome.com/c4c41a2319.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="card">
        <div class="image">
            <img src="./pic.jpg" alt="Card Image">
            <h2>Hi, I'm <span id="M">Marshal</span></h2>
            <p>I'm a web Developer</p>
        </div>
        <div class="content">
            <p>This is a description of the card content. It provides more details about the card and its purpose.
            </p>
            <div class="items">

                <span>
                    Send Email
                </span>

            </div>
        </div>
        <div class="social-links">
            <a href="https://www.facebook.com/marshal" target="_blank"><i class="fa-brands fa-facebook"></i></a>
            <a href="https://www.twitter.com/marshal" target="_blank"><i class="fa-brands fa-twitter"></i></a>
            <a href="https://www.linkedin.com/in/marshal" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
            <span id="social">

                <a href="https://www.instagram.com/marshal" target="_blank" id="instagram"><i
                        class="fa-brands fa-instagram"></i></a>
                <a href="https://www.github.com/marshal" target="_blank" id="github"><i
                        class="fa-brands fa-github"></i></a>

            </span>
        </div>
</body>

</html>
